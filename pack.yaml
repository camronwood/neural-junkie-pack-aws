id: aws
version: "2.0.0"
title: AWS
description: AWSExpert — account-aware SRE copilot with typed boto3 tools, IaC drift, cost/security lenses, and gated writes.
layout_profile: team
capabilities:
  - aws-api
  - aws-sso
  - aws-sidecar
  - aws-report-canvas
capability_defs:
  aws-api:
    kind: mcp-tools
    label: AWS API
    description: Account-aware AWS inspection and gated infrastructure operations.
    exposure: sensitive
    mcp_agents:
      - aws
  aws-sidecar:
    kind: hub-sidecar
    routes:
      - /api/aws
    sidecar:
      module: assets/hub/server.py
    settings:
      - aws_profile
      - aws_default_region
      - aws_allowed_profiles
      - aws_allowed_accounts
      - aws_read_only
      - aws_write_enabled
      - aws_write_audit_path
      - aws_org_root_id
      - aws_dry_run
      - python_executable
      - aws_venv
  aws-report-canvas:
    kind: artifact-renderer
    renderer: nj.chart
    media_types:
      - application/vnd.neural-junkie.aws-report+json
    renderer_api_version: 1
    schema_version_min: 1
    schema_version_max: 1
    fallback: nj.table
settings_overlay:
  aws_default_region: us-east-2
  aws_venv: ~/.neural-junkie/aws/venv
  python_executable: ~/.neural-junkie/aws/venv/bin/python3
  aws_dry_run: false
  aws_write_audit_path: ~/.neural-junkie/aws-audit.log
agents:
  - type: aws
    name: AWSExpert
    implementation: builtin/aws
    ollama_model: qwen3.5:27b
    compose:
      tool_model: qwen3.5:9b
      consult_triggers:
        - aws
        - sso
        - iam
        - ec2
        - s3
        - lambda
        - cloudformation
        - cost explorer
        - security hub
        - guardduty
        - cloudwatch alarm
        - account
        - organization
        - drift
models_to_ensure:
  - qwen3.5:27b
  - qwen3.5:9b
ollama_model: qwen3.5:27b
expert_slug: aws
expert_label: AWS / Cloud infrastructure
mcp_agents:
  - aws
assets:
  workspace_guide: assets/WORKSPACE.md
  runbooks_glob: assets/runbooks/*.md
